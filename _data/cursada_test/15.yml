descripcion: |
  Esta semana tiene las siguientes actividades:
  - Recuperatorio de Parcial para las Comisiones 1A y 1B (Turno Noche).
  - Re Entrega de los TP Game Grupal de las Comisiones 1A y 1B (Turno Noche).
  - Exposición y defensa de los TP Game Grupal de la Comisión 2 (Turno Mañana).
  - Exposición y defensa de los TP Game Grupal de la Comisión 1(Rosario) (Turno Noche).


  A continuación detallamos la modalidad de cada actividad según cada comisión:

  ### **Comisión 1 (1A y 1B) Turno Noche (sede Unahur)**
  #### **Recuperatorio de Parcial**
  Será el **Martes 2 de julio 18:00hs.** **PRESENCIAL** en Laboratorio Aula MA-111 (Edificio Malvinas Argentinas 1er.piso) <br>
  La modalidad será **INDIVIDUAL** y **ABIERTO**, lo que significa que podrán utilizar todos los apuntes que tengan tanto físicos como digitales.
  Tendrá una duración de 3 horas y consistirá en resolver un ejercicio similar a los que trabajamos en las últimas clases, siendo la única forma de entrega la realización del push al repositorio de github que será provisto por el docente en el momento del inicio del examen recuperatorio de parcial.
  
  **Importantísimo**: Lleven anotado en físico o digital el token personal de github ya que una vez cumplido el horario de fin del examen no se podrá realizar el push y quedará sin entregar.

  #### **Re Entrega TP Game Grupal Comisiones 1A y 1B**
  Se realizará en la modalidad **VIRTUAL** el **Sábado 6 de Julio** a partir de las 10:00hs. <br>	
  - Comisión 1A: [**Link Comisión 1A**](https://meet.google.com/ban-fwrr-agh) <br>
  - Comisión 1B: [**Link Comisión 1B**](https://meet.google.com/vmb-vsee-nuv) <br>

  ### **Comisión 2 (Turno Mañana)**
  #### **Exposición y defensa de TP Game Grupal**
  Será el **Miércoles 3 de julio 8:00hs.** **PRESENCIAL** en Laboratorio Aula MA-113 (Edificio Malvinas Argentinas 1er.piso) <br>

