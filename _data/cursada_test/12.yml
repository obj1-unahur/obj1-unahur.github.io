descripcion: |
  Esta semana es para practicar fuerte para el parcial, que será en modalidad PRESENCIAL los días:
  
  - **_Comisiones 1 y 1B_**: Martes 18/6/24 18:00hs.
  - **_Comisión 2_**: Miércoles 19/6/24 8:00hs.
  - **_Comisión 1Rosario_**: Sábado 29/6/24 10hs.

  Les estamos dejando 2 ejercicios para que resuelvan en forma individual. Recuerden la recomendación de tomarse el tiempo de leer primero muy bien todo el dominio del problema y luego ir resolviendo por etapas. <br> 
  Aprovechen el canal de Discord para enviar sus consultas que siempre encontrarán compañeros/as, profes y colaboradores/as dispuestos/as a ayudar y evacuar dudas. <br>
  
    **ATENCIÓN:**<br>
  **----------------**<br>
  **Con motivo del paro anunciado para los días martes 11/6 y miércoles 12/6, les informamos que no habrá clases presenciales. En el horario de las cursadas de comisión turno noche, se abrirá espacio de consulta Virtual donde los docentes se conectarán para responder dudas sobre la resolución de los ejercicios de esta semana.**<br>
  

