descripcion: |
  Esta semana veremos formalmente el tema de closures y colecciones con las comisiones de turno noche, y turno mañana seguirá practicando lo visto en la última clase. 
  
  Hay dos videos de cuatrimestres anteriores donde volvemos sobre el ejercicio de golosinas, para entender qué hicimos comparando la visión interna, que se ve en el diagrama dinámico, con la externa, que se ve en el código. 
    
  Volvemos a insistir sobre los conceptos básicos: división de tareas en distintos objetos, contrato, polimorfismo, definición del estado (la memoria) de un objeto.  
  En el último, repasamos las operaciones que resuelven recorridos, y planteamos cómo usar la idea de tipo para elegir cuál de las operaciones (filter / map / all / any / etc.) usar en cada caso. La noción de tipo los va a acompañar durante toda su carrera como programadorxs, es importante que se vayan haciendo amigxs :-)

  **Atención que lanzamos el primer TP Grupal** <br>
  El primer enunciado ya lo tienen disponible y se llama "Camión de Transporte". Vayan tranqui, tienen 2 semanas para hacerlo. La fecha límite de entrega es 13/5/24. **Antes de aceptar la asignación, leer las instrucciones** ya que deben tener previamente armados los grupos y deberán ser de mínimo 4 y máximo 6 integrantes.<br>
  Cualquier duda nos consultan por el canal de Discord.

  

