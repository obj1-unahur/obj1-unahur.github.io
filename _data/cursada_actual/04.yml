descripcion: |
  Esta semana seguimos trabajando los conceptos que ya vimos, profundizando en el tema test automáticos, y seguimos jugando con  Wollok Game. 
  Les dejamos 2 videos cortos sobre Game para ir fijando los conceptos que fuimos viendo en clase.<br>
  También hay videos que refuerzan los conceptos de referencias y polimorfismo, recomendamos que los vean y analicen en detalle y cualquier duda estamos en Discord.<br> 
  Y les dejamos el primer TP Individual para entregar, que se llama "Viajes en auto". Aceptan la asignación como lo venimos haciendo en las clases anteriores, y la entrega será haciendo push al repositorio de github de c/u. <br>

  La comisión de los días miércoles empezará a conocer el concepto de colecciones en objetos y también que son los closures. En próximas semanas, seguiremos bajando a detalle esos temas también en las otras comisiones ya que entra en el 1er TP Grupal que será publicado la semana que viene, vayan organizándose en grupos, que deberán ser de un mínimo de 4 y máximo 6 integrantes **de la misma comisión**.

  

