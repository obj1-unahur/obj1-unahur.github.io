descripcion: |
  Esta semana tiene las siguientes actividades:
  - Examen Parcial de la Comisión 2 (Turno Mañana).
  - Entrega y defensa de los TP Game Grupal de las subcomisiones 1A y 1B de Turno Noche. 

  A continuación detallamos la modalidad de cada actividad según cada comisión:

  ### **Comisión 1 Rosario**
  **SIN ACTIVIDAD** - No hay actividades programadas para esta semana. Aprovechen para avanzar con el TP Game y practicar para el parcial del 29/6 10hs.

  ### **Comisión 2 Turno Mañana**
  **PARCIAL PRESENCIAL** - Miércoles 26/6 8:00hs - Aula MA-113 (Edificio Malvinas Argentinas 1er.piso)<br>
  Los que puedan y deseen llevar sus notebooks para poder trabajar en ellas pueden hacerlo; consideren llevar también adaptador de red, cable ethernet, y los accesorios que requieran para conectarse, teniendo en cuenta que no habrá red Wifi disponible. 
  
  La modalidad será **INDIVIDUAL** y **ABIERTO**, lo que significa que podrán utilizar todos los apuntes que tengan tanto físicos como digitales.
  Tendrá una duración de 3 horas y consistirá en resolver un ejercicio similar a los que trabajamos en las últimas clases, siendo la única forma de entrega la realización del push al repositorio de github que será provisto por el docente en el momento del inicio del parcial.
  
  **Importantísimo**: Lleven anotado en físico o digital el token personal de github ya que una vez cumplido el horario de fin del examen no se podrá realizar el push y quedará sin entregar.

  ### **Comisión 1 Turno Noche (sede Unahur)**
  La defensa de los TP será en modalidad **VIRTUAL** el día **Martes 25 de Junio** a partir de las 18:15hs. 
  
